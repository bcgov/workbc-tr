name: Deploy Dev

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

env:
  IMAGE_ID: ${{ secrets.AWS_ECR_URI }}
  
  TF_VERSION: 1.0.5
  TG_VERSION: 0.31.4
  TG_SRC_PATH: terraform
  TFC_WORKSPACE: dev

permissions:
  id-token: write
  contents: read

jobs:
  cd:
    name: cd
    runs-on: ubuntu-22.04
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Check out the repo
        uses: actions/checkout@v2
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_TO_USE_DEV }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --name workbc-cluster2 --region ${{ secrets.AWS_REGION }}

      - name: Set image on Kubernetes deployment
        env:
          IMAGE: ${{ secrets.AWS_ECR_URI }}:${{ github.event.workflow_run.head_sha }}
        run: |
          kubectl delete job drupal-drush-cer -n app --ignore-not-found
          sed "s|__IMAGE__|$IMAGE|g" yaml/drush.yaml | kubectl apply -f -
          kubectl wait --for=condition=complete job/drupal-drush-workbc --timeout=300s -n app
          kubectl set image deployment/cer drupal=$IMAGE --namespace=app
